<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Label Match 작업 중심 UI 방향 1 - 3열 작업대</title>
  <desc id="desc">선정된 권장안. 왼쪽 작업 정보, 중앙 5단계와 실제 현재 세트 스캔 목록, 오른쪽 기록 탭과 F1부터 F4 작업 버튼을 배치한다.</desc>
  <style>
    text { font-family: "Malgun Gothic", "Segoe UI", sans-serif; fill: #172033; }
    .title { font-size: 22px; font-weight: 800; }
    .h1 { font-size: 30px; font-weight: 900; }
    .h2 { font-size: 18px; font-weight: 800; }
    .body { font-size: 14px; font-weight: 600; }
    .small { font-size: 12px; font-weight: 600; }
    .tiny { font-size: 11px; font-weight: 700; }
    .muted { fill: #657084; }
    .primary { fill: #2459e0; }
    .success { fill: #1f8a55; }
    .danger { fill: #b42318; }
    .white { fill: #ffffff; }
    .mono { font-family: Consolas, "Malgun Gothic", monospace; font-size: 12px; }
  </style>

  <rect width="1440" height="900" fill="#f3f6fa"/>

  <!-- Utility header -->
  <rect x="20" y="16" width="1400" height="56" rx="12" fill="#ffffff" stroke="#d7dee8"/>
  <circle cx="46" cy="44" r="13" fill="#2459e0"/>
  <path d="M40 44h12M46 38v12" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <text x="68" y="51" class="title">Label Match · 작업 중심 화면</text>
  <text x="370" y="50" class="small muted">현품표 → 제품 1 → 제품 2 → 제품 3 → 최종 라벨</text>
  <rect x="1115" y="28" width="142" height="32" rx="16" fill="#173b8f"/>
  <text x="1186" y="49" text-anchor="middle" class="small white">권장 · 선정</text>
  <text x="1275" y="50" class="small muted">1440×900 · v2.0.36</text>

  <!-- Three columns -->
  <rect x="20" y="84" width="250" height="796" rx="14" fill="#ffffff" stroke="#d7dee8"/>
  <rect x="282" y="84" width="720" height="796" rx="14" fill="#ffffff" stroke="#bdc9da" stroke-width="1.5"/>
  <rect x="1014" y="84" width="406" height="796" rx="14" fill="#ffffff" stroke="#d7dee8"/>

  <!-- Left: context -->
  <text x="40" y="119" class="h2">현재 작업</text>
  <rect x="36" y="136" width="218" height="184" rx="10" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="52" y="163" class="small muted">작업자</text><text x="126" y="163" class="body">김작업</text>
  <text x="52" y="190" class="small muted">세트 ID</text><text x="126" y="190" class="small">LM-0715-0042</text>
  <text x="52" y="217" class="small muted">현품표</text><text x="126" y="217" class="small">AAA2287590100</text>
  <text x="52" y="244" class="small muted">품목</text><text x="126" y="244" class="body">샤프트 캡</text>
  <text x="52" y="271" class="small muted">차수</text><text x="126" y="271" class="body">L07</text>
  <text x="52" y="298" class="small muted">입력 종류</text><text x="126" y="298" class="body">일반 현품표</text>

  <text x="40" y="356" class="h2">상태</text>
  <rect x="36" y="372" width="92" height="30" rx="15" fill="#e8f6ee"/>
  <text x="82" y="392" text-anchor="middle" class="small success">복구됨</text>
  <rect x="136" y="372" width="118" height="30" rx="15" fill="#eef4ff"/>
  <text x="195" y="392" text-anchor="middle" class="small primary">F4 완료 3/3</text>
  <rect x="36" y="414" width="218" height="98" rx="10" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="52" y="440" class="small muted">QA 진행</text>
  <text x="52" y="470" class="h2">2 / 5 정상 스캔</text>
  <text x="52" y="495" class="small muted">F4는 QA 5단계와 별도 집계</text>

  <text x="40" y="700" class="h2">최소 설정</text>
  <rect x="36" y="718" width="218" height="54" rx="9" fill="#ffffff" stroke="#bdc9da"/>
  <text x="52" y="741" class="small muted">작업자</text><text x="52" y="760" class="body">김작업</text>
  <rect x="36" y="784" width="104" height="44" rx="9" fill="#f8fafc" stroke="#bdc9da"/>
  <rect x="150" y="784" width="104" height="44" rx="9" fill="#f8fafc" stroke="#bdc9da"/>
  <text x="88" y="812" text-anchor="middle" class="body">설정</text>
  <text x="202" y="812" text-anchor="middle" class="body">정보</text>
  <text x="40" y="855" class="small muted">입력 포커스: 스캐너 대기</text>

  <!-- Center: stage and action -->
  <rect x="302" y="104" width="680" height="88" rx="11" fill="#eef4ff" stroke="#9bb4f4"/>
  <text x="326" y="140" class="h1">3/5 제품 2 다시 스캔</text>
  <text x="326" y="169" class="body primary">중복 입력을 확인한 뒤 제품 2 바코드를 스캔하세요.</text>
  <rect x="830" y="121" width="128" height="30" rx="15" fill="#dce7ff"/>
  <text x="894" y="141" text-anchor="middle" class="small primary">다음 행동 고정</text>

  <!-- Five-step rail -->
  <g>
    <rect x="302" y="208" width="132" height="48" rx="8" fill="#e8f6ee" stroke="#72bf91"/>
    <rect x="438" y="208" width="132" height="48" rx="8" fill="#e8f6ee" stroke="#72bf91"/>
    <rect x="574" y="208" width="132" height="48" rx="8" fill="#fff0f0" stroke="#d92d20" stroke-width="2"/>
    <rect x="710" y="208" width="132" height="48" rx="8" fill="#f8fafc" stroke="#d7dee8"/>
    <rect x="846" y="208" width="136" height="48" rx="8" fill="#f8fafc" stroke="#d7dee8"/>
    <text x="368" y="229" text-anchor="middle" class="tiny success">1 · 완료</text><text x="368" y="247" text-anchor="middle" class="small">현품표</text>
    <text x="504" y="229" text-anchor="middle" class="tiny success">2 · 완료</text><text x="504" y="247" text-anchor="middle" class="small">제품 1</text>
    <text x="640" y="229" text-anchor="middle" class="tiny danger">3 · 다시 입력</text><text x="640" y="247" text-anchor="middle" class="small">제품 2</text>
    <text x="776" y="229" text-anchor="middle" class="tiny muted">4 · 대기</text><text x="776" y="247" text-anchor="middle" class="small muted">제품 3</text>
    <text x="914" y="229" text-anchor="middle" class="tiny muted">5 · 대기</text><text x="914" y="247" text-anchor="middle" class="small muted">최종 라벨</text>
  </g>

  <!-- Single warning location -->
  <rect x="302" y="272" width="680" height="70" rx="10" fill="#fff7e6" stroke="#e5a03a" stroke-width="1.5"/>
  <circle cx="329" cy="307" r="15" fill="#b45309"/>
  <text x="329" y="312" text-anchor="middle" class="body white">!</text>
  <text x="354" y="299" class="body" fill="#8a3f00">중복 스캔</text>
  <text x="354" y="324" class="small muted">직전 입력은 목록에 추가하지 않았습니다. 제품 2를 다시 스캔하세요.</text>
  <rect x="836" y="289" width="126" height="36" rx="8" fill="#ffffff" stroke="#d08a24"/>
  <text x="899" y="312" text-anchor="middle" class="small">확인 Enter / Esc</text>

  <!-- Scan entry -->
  <rect x="302" y="356" width="680" height="54" rx="10" fill="#ffffff" stroke="#2459e0" stroke-width="2"/>
  <rect x="302" y="356" width="116" height="54" rx="10" fill="#2459e0"/>
  <rect x="408" y="356" width="10" height="54" fill="#2459e0"/>
  <text x="360" y="389" text-anchor="middle" class="body white">스캔 입력</text>
  <text x="438" y="389" class="body muted">확인 후 제품 2 바코드 대기</text>

  <!-- Actual current scan list -->
  <rect x="302" y="426" width="680" height="430" rx="11" fill="#ffffff" stroke="#bdc9da"/>
  <rect x="318" y="442" width="158" height="38" rx="8" fill="#2459e0"/>
  <text x="397" y="467" text-anchor="middle" class="body white">현재 세트 2/5</text>
  <rect x="484" y="442" width="190" height="38" rx="8" fill="#eef4ff" stroke="#9bb4f4"/>
  <text x="579" y="467" text-anchor="middle" class="body primary">F4 전체 재스캔 3/3</text>
  <text x="958" y="466" text-anchor="end" class="small muted">실제 런타임 스캔 값</text>

  <rect x="318" y="492" width="648" height="34" rx="6" fill="#edf1f6"/>
  <text x="338" y="514" class="small muted">단계</text>
  <text x="402" y="514" class="small muted">역할</text>
  <text x="510" y="514" class="small muted">상태</text>
  <text x="600" y="514" class="small muted">스캔 값</text>

  <g class="small">
    <rect x="318" y="532" width="648" height="46" rx="6" fill="#edf8f2"/>
    <text x="344" y="560">1</text><text x="402" y="560">현품표</text><text x="510" y="560" class="success">완료</text><text x="600" y="560" class="mono">AAA2287590100</text>
    <rect x="318" y="584" width="648" height="46" rx="6" fill="#edf8f2"/>
    <text x="344" y="612">2</text><text x="402" y="612">제품 1</text><text x="510" y="612" class="success">완료</text><text x="600" y="612" class="mono">AAA2287590100-P01-20260715</text>
    <rect x="318" y="636" width="648" height="46" rx="6" fill="#fff7e6" stroke="#e5a03a"/>
    <text x="344" y="664">3</text><text x="402" y="664">제품 2</text><text x="510" y="664" fill="#b45309">다음 스캔</text><text x="600" y="664" class="muted">—</text>
    <rect x="318" y="688" width="648" height="46" rx="6" fill="#f8fafc"/>
    <text x="344" y="716">4</text><text x="402" y="716">제품 3</text><text x="510" y="716" class="muted">대기</text><text x="600" y="716" class="muted">—</text>
    <rect x="318" y="740" width="648" height="46" rx="6" fill="#f8fafc"/>
    <text x="344" y="768">5</text><text x="402" y="768">최종 라벨</text><text x="510" y="768" class="muted">대기</text><text x="600" y="768" class="muted">—</text>
  </g>
  <rect x="318" y="800" width="648" height="40" rx="7" fill="#f8fafc" stroke="#e1e7ef"/>
  <text x="334" y="825" class="small muted">선택 행 원문</text>
  <text x="442" y="825" class="mono">AAA2287590100-P01-20260715-L07</text>

  <!-- Right: session/history/summary tabs -->
  <text x="1034" y="116" class="h2">스캔 내역과 후속 작업</text>
  <rect x="1034" y="132" width="118" height="38" rx="8" fill="#2459e0"/>
  <rect x="1158" y="132" width="118" height="38" rx="8" fill="#f8fafc" stroke="#d7dee8"/>
  <rect x="1282" y="132" width="118" height="38" rx="8" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="1093" y="157" text-anchor="middle" class="small white">이번 세션</text>
  <text x="1217" y="157" text-anchor="middle" class="small">기록 조회</text>
  <text x="1341" y="157" text-anchor="middle" class="small">누적</text>

  <rect x="1034" y="182" width="366" height="334" rx="10" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="1052" y="209" class="small muted">시각</text><text x="1120" y="209" class="small muted">현품표</text><text x="1338" y="209" class="small muted">결과</text>
  <line x1="1050" y1="222" x2="1384" y2="222" stroke="#d7dee8"/>
  <g class="small">
    <text x="1052" y="250">07:08</text><text x="1120" y="250">AAA2270730100</text><text x="1340" y="250" class="success">통과</text>
    <text x="1052" y="286">07:15</text><text x="1120" y="286">AAA2287580100</text><text x="1340" y="286" class="success">소량</text>
    <text x="1052" y="322">07:22</text><text x="1120" y="322">AAA2287590100</text><text x="1340" y="322" fill="#b45309">진행</text>
  </g>
  <rect x="1050" y="346" width="334" height="74" rx="8" fill="#ffffff" stroke="#e1e7ef"/>
  <text x="1066" y="371" class="small muted">선택 세트</text>
  <text x="1066" y="397" class="body">AAA2287590100 · 제품 1까지 완료</text>
  <text x="1050" y="478" class="small muted">기록표는 보조 정보이며 현재 작업을 가리지 않습니다.</text>

  <rect x="1034" y="532" width="366" height="92" rx="10" fill="#eef4ff" stroke="#9bb4f4"/>
  <text x="1052" y="558" class="small primary">후속 작업</text>
  <text x="1052" y="583" class="body">오류 확인 후 제품 2를 다시 스캔</text>
  <text x="1052" y="606" class="small muted">F3 소량 완료 가능 · F4 완료 3/3</text>

  <text x="1034" y="660" class="h2">기능키</text>
  <rect x="1034" y="674" width="177" height="68" rx="10" fill="#2459e0"/>
  <rect x="1223" y="674" width="177" height="68" rx="10" fill="#eef4ff" stroke="#2459e0" stroke-width="1.5"/>
  <rect x="1034" y="754" width="177" height="68" rx="10" fill="#fff5f5" stroke="#c62828" stroke-width="1.5"/>
  <rect x="1223" y="754" width="177" height="68" rx="10" fill="#fff5f5" stroke="#c62828" stroke-width="1.5"/>
  <text x="1122" y="704" text-anchor="middle" class="body white">소량 완료</text><text x="1122" y="727" text-anchor="middle" class="small white">F3</text>
  <text x="1311" y="704" text-anchor="middle" class="body primary">전체 재스캔</text><text x="1311" y="727" text-anchor="middle" class="small primary">F4 · 완료</text>
  <text x="1122" y="784" text-anchor="middle" class="body danger">현재 세트 취소</text><text x="1122" y="807" text-anchor="middle" class="small danger">F1</text>
  <text x="1311" y="784" text-anchor="middle" class="body danger">완료 트레이 취소</text><text x="1311" y="807" text-anchor="middle" class="small danger">F2</text>
  <text x="1034" y="850" class="small muted">F2·F4 추가 입력은 이 영역의 상태 전환으로 처리</text>
</svg>
