name: Create GitHub Release for Label_Match

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      LABEL_MATCH_RELEASE_TAG: ${{ github.ref_name }}
      PYTHONNOUSERSITE: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12.10'

      - name: Validate release identity
        run: |
          python -I -S tools/verify_release_identity.py --expected-tag "$env:LABEL_MATCH_RELEASE_TAG" --expected-sha "$env:GITHUB_SHA" --reviewed-ref "refs/remotes/origin/main" --report "$env:RUNNER_TEMP\label-match-release-identity.json"

      - name: Resolve private update feed publish mode
        id: private_feed
        shell: pwsh
        env:
          PRIVATE_UPDATE_FEED_PUBLISH_MODE: ${{ vars.ENABLE_PRIVATE_UPDATE_FEED_PUBLISH }}
        run: |
          $privateFeedMode = if ($null -eq $env:PRIVATE_UPDATE_FEED_PUBLISH_MODE) { "" } else { $env:PRIVATE_UPDATE_FEED_PUBLISH_MODE }
          if (@("", "false", "true") -cnotcontains $privateFeedMode) {
            throw "ENABLE_PRIVATE_UPDATE_FEED_PUBLISH must be exactly 'true', 'false', or unset."
          }
          $enabled = if ($privateFeedMode -ceq "true") { "true" } else { "false" }
          "enabled=$enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $venvRoot = Join-Path $env:RUNNER_TEMP "label-match-release-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          if (Test-Path -LiteralPath $venvRoot) {
            throw "Fresh release venv path already exists: $venvRoot"
          }
          python -I -m venv $venvRoot
          "LABEL_MATCH_RELEASE_VENV=$venvRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $venvPython = Join-Path $venvRoot "Scripts\python.exe"
          & $venvPython -I -m pip install --disable-pip-version-check --only-binary=:all: --require-hashes --no-deps -r requirements-release.txt
          & $venvPython -I -m pip check
          (Join-Path $venvRoot "Scripts") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tests
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python -B -m py_compile Label_Match.py package_logistics.py direct_sync_push.py direct_sync_runtime.py direct_sync_operator.py tools/direct_sync_relay_runner.py tools/direct_sync_relay_operator.py tools/direct_sync_relay_install_pack.py tools/direct_sync_phase_g_label_match_runtime_report.py tools/register_label_match_worker_pc.py tools/build_release_cli_tools.py tools/build_release_archive.py tools/verify_release_identity.py tools/verify_staged_release_installer.py
          # These two tests require the fixed physical non-primary DISPLAY2 and remain field evidence, not GitHub-hosted release gates.
          python -m pytest -q --deselect tests/test_label_operator_workbench.py::test_live_submission_retry_keeps_full_server_error_and_five_scan_rows --deselect tests/test_label_operator_workbench.py::test_display2_1366_scale100_keeps_operator_content_inside_its_regions

      - name: Build with PyInstaller (One-Folder mode)
        # ❗ 이 부분에 --hidden-import tkcalendar 옵션을 추가했습니다.
        run: python -m PyInstaller --name "Label_Match" --onedir --windowed --icon="assets/logo.ico" --add-data "assets;assets" --add-data "config;config" --hidden-import pygame --hidden-import PIL --hidden-import tkcalendar --clean --noupx --noconfirm Label_Match.py

      - name: Build direct-sync CLI tools
        run: |
          python tools/build_release_cli_tools.py --destination "dist/Label_Match/tools" --help-timeout-seconds 15 --probe-count 3

      - name: Include direct-sync relay tools
        run: |
          New-Item -ItemType Directory -Force -Path dist/Label_Match/tools
          Copy-Item install_label_match_direct_sync.ps1 -Destination dist/Label_Match
          Copy-Item "$env:RUNNER_TEMP\label-match-release-identity.json" -Destination dist/Label_Match/release-identity.json
          Copy-Item direct_sync_push.py,direct_sync_runtime.py,direct_sync_operator.py -Destination dist/Label_Match
          Copy-Item tools/direct_sync_relay_runner.py,tools/direct_sync_relay_operator.py,tools/direct_sync_relay_install_pack.py,tools/direct_sync_phase_g_label_match_runtime_report.py,tools/register_label_match_worker_pc.py -Destination dist/Label_Match/tools

      - name: Record tokenless self-enrollment note
        run: |
          [System.IO.File]::WriteAllText("dist/Label_Match/tools/enrollment_token.txt.template", "Normal installs use PRODUCER_SELF_ENROLL_ALLOWED_IPS on the server. Do not bundle a deployment token unless an explicit fallback change window requires it.", [System.Text.UTF8Encoding]::new($false))

      - name: Attach install update settings
        shell: pwsh
        env:
          PRIVATE_UPDATE_FEED_PUBLISH_MODE: ${{ steps.private_feed.outputs.enabled }}
          PRIVATE_UPDATE_MANIFEST_URL: ${{ vars.PRIVATE_UPDATE_MANIFEST_URL }}
          PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL: ${{ vars.PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL }}
          PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY: ${{ vars.PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY }}
          PRIVATE_UPDATE_CHANNEL: ${{ vars.PRIVATE_UPDATE_CHANNEL }}
          PRIVATE_UPDATE_ARTIFACT_BASE_URL: ${{ vars.PRIVATE_UPDATE_ARTIFACT_BASE_URL }}
          COMPANY_UPDATE_UPLOAD_URL: ${{ vars.COMPANY_UPDATE_UPLOAD_URL }}
        run: |
          $settingsPaths = @(
            "dist/Label_Match/_internal/config/app_settings.json",
            "dist/Label_Match/config/app_settings.json"
          )
          $settingsPath = $settingsPaths | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($settingsPath)) {
            throw "Bundled config missing in expected paths: $($settingsPaths -join ', ')"
          }
          $settings = Get-Content -Raw -Encoding UTF8 -LiteralPath $settingsPath | ConvertFrom-Json
          $channel = if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_CHANNEL)) { "stable" } else { $env:PRIVATE_UPDATE_CHANNEL.Trim() }
          $publishPrivateFeed = $env:PRIVATE_UPDATE_FEED_PUBLISH_MODE -ceq "true"
          if ($publishPrivateFeed) {
            if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_URL) -or [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY)) {
              throw "PRIVATE_UPDATE_MANIFEST_URL and PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY must be set together."
            }
            foreach ($name in @("PRIVATE_UPDATE_ARTIFACT_BASE_URL", "COMPANY_UPDATE_UPLOAD_URL")) {
              if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name").Value)) {
                throw "$name is required when ENABLE_PRIVATE_UPDATE_FEED_PUBLISH is true."
              }
            }
            $updateSettings = [ordered]@{
              provider = "private_manifest"
              manifest_url = $env:PRIVATE_UPDATE_MANIFEST_URL.Trim()
              manifest_public_key = $env:PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY.Trim()
              channel = $channel
            }
            if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL)) {
              $updateSettings.manifest_signature_url = $env:PRIVATE_UPDATE_MANIFEST_SIGNATURE_URL.Trim()
            }
          } else {
            $updateSettings = [ordered]@{
              provider = "github"
              channel = $channel
            }
          }
          $settings | Add-Member -NotePropertyName update_settings -NotePropertyValue ([pscustomobject]$updateSettings) -Force
          foreach ($targetPath in $settingsPaths) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $targetPath) | Out-Null
            $settings | ConvertTo-Json -Depth 10 | Set-Content -Encoding utf8NoBOM -LiteralPath $targetPath
          }

      - name: Verify staged installer without system Python
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          python tools/verify_staged_release_installer.py --package-root "dist/Label_Match" --report "dist/Label_Match/staged-installer-verification.json"
          $env:LABEL_MATCH_STAGED_PACKAGE_ROOT = (Resolve-Path "dist/Label_Match").Path
          $env:LABEL_MATCH_REQUIRE_STAGED_INSTALLER_TEST = "1"
          python -m pytest -q -p no:cacheprovider tests/test_staged_release_installer.py

      - name: Build and verify internal release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $env:LABEL_MATCH_PACKAGE_ROOT = (Resolve-Path "dist/Label_Match").Path
          $env:LABEL_MATCH_ARCHIVE_PATH = "Label_Match-$($env:LABEL_MATCH_RELEASE_TAG).zip"
          $env:LABEL_MATCH_ARCHIVE_REPORT = "Label_Match-$($env:LABEL_MATCH_RELEASE_TAG).archive-verification.json"
          $env:LABEL_MATCH_SOURCE_EPOCH = git show -s --format=%ct HEAD
          $script = @'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path, PurePosixPath
          import stat
          import zipfile

          package_root = Path(os.environ["LABEL_MATCH_PACKAGE_ROOT"]).resolve()
          archive_path = Path(os.environ["LABEL_MATCH_ARCHIVE_PATH"]).resolve()
          report_path = Path(os.environ["LABEL_MATCH_ARCHIVE_REPORT"]).resolve()
          source_epoch = int(os.environ["LABEL_MATCH_SOURCE_EPOCH"])
          required = {
              "Label_Match.exe",
              "release-identity.json",
              "install_label_match_direct_sync.ps1",
              "staged-installer-verification.json",
              "tools/release_cli_tools_manifest.json",
              "tools/direct_sync_relay_runner.exe",
              "tools/direct_sync_relay_install_pack/direct_sync_relay_install_pack.exe",
              "tools/register_label_match_worker_pc.exe",
          }
          files = sorted(
              (path for path in package_root.rglob("*") if path.is_file()),
              key=lambda path: path.relative_to(package_root).as_posix().casefold(),
          )
          relative = [path.relative_to(package_root).as_posix() for path in files]
          if not required.issubset(relative):
              raise SystemExit(f"required internal release files missing: {sorted(required - set(relative))}")
          if len({name.casefold() for name in relative}) != len(relative):
              raise SystemExit("case-insensitive package path collision")
          instant = datetime.datetime.fromtimestamp(source_epoch, tz=datetime.timezone.utc)
          timestamp = (
              max(1980, min(2107, instant.year)),
              instant.month,
              instant.day,
              instant.hour,
              instant.minute,
              instant.second // 2 * 2,
          )
          source_hashes = {}
          with zipfile.ZipFile(
              archive_path,
              "x",
              compression=zipfile.ZIP_DEFLATED,
              compresslevel=9,
              allowZip64=True,
          ) as archive:
              for source, name in zip(files, relative, strict=True):
                  payload = source.read_bytes()
                  source_hashes[name] = hashlib.sha256(payload).hexdigest()
                  info = zipfile.ZipInfo(f"Label_Match/{name}", date_time=timestamp)
                  info.compress_type = zipfile.ZIP_DEFLATED
                  info.create_system = 3
                  info.external_attr = (stat.S_IFREG | 0o644) << 16
                  archive.writestr(info, payload, compress_type=zipfile.ZIP_DEFLATED, compresslevel=9)
          with zipfile.ZipFile(archive_path, "r") as archive:
              if (bad_member := archive.testzip()) is not None:
                  raise SystemExit(f"archive CRC failed: {bad_member}")
              names = [info.filename for info in archive.infolist() if not info.is_dir()]
              if len(names) != len(set(names)) or len({name.casefold() for name in names}) != len(names):
                  raise SystemExit("archive contains duplicate or case-colliding paths")
              expected = {f"Label_Match/{name}" for name in relative}
              if set(names) != expected:
                  raise SystemExit("archive membership differs from staged package")
              for name in names:
                  pure = PurePosixPath(name)
                  if pure.is_absolute() or ".." in pure.parts or pure.parts[0] != "Label_Match":
                      raise SystemExit(f"unsafe archive path: {name}")
                  child = PurePosixPath(*pure.parts[1:]).as_posix()
                  if hashlib.sha256(archive.read(name)).hexdigest() != source_hashes[child]:
                      raise SystemExit(f"archive byte parity failed: {name}")
          archive_hash = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          report = {
              "schema_version": "label-match-internal-release-archive-v1",
              "status": "PASS",
              "release_trust": "internal_unsigned",
              "archive": archive_path.name,
              "archive_sha256": archive_hash,
              "archive_size": archive_path.stat().st_size,
              "package_file_count": len(files),
              "required_membership": sorted(required),
              "exact_membership": True,
              "byte_parity": True,
              "crc_verified": True,
              "safe_paths": True,
          }
          report_path.write_text(
              json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, sort_keys=True))
          '@
          $script | python -
          if ($LASTEXITCODE -ne 0) {
            throw "Internal release archive verification failed."
          }

      - name: Generate release SHA256 checksum
        shell: pwsh
        run: |
          $zipPath = "Label_Match-$($env:LABEL_MATCH_RELEASE_TAG).zip"
          $hash = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          "$hash  $zipPath" | Set-Content -Encoding utf8NoBOM "$zipPath.sha256"

      - name: Generate private update manifest
        if: ${{ steps.private_feed.outputs.enabled == 'true' }}
        shell: pwsh
        env:
          PRIVATE_UPDATE_ARTIFACT_BASE_URL: ${{ vars.PRIVATE_UPDATE_ARTIFACT_BASE_URL }}
          PRIVATE_UPDATE_ROLLOUT_PERCENTAGE: ${{ vars.PRIVATE_UPDATE_ROLLOUT_PERCENTAGE }}
        run: |
          $zipPath = "Label_Match-$($env:LABEL_MATCH_RELEASE_TAG).zip"
          $hash = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          $size = (Get-Item -LiteralPath $zipPath).Length
          $baseUrl = $env:PRIVATE_UPDATE_ARTIFACT_BASE_URL.Trim().TrimEnd("/")
          $baseUri = [System.Uri]$baseUrl
          if ($baseUri.Scheme -ne "https") {
            throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must use HTTPS."
          }
          if (-not [string]::IsNullOrWhiteSpace($baseUri.UserInfo)) {
            throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must not include userinfo."
          }
          if (-not [string]::IsNullOrWhiteSpace($baseUri.Fragment)) {
            throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must not include fragments."
          }
          if (-not [string]::IsNullOrWhiteSpace($baseUri.Query)) {
            throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must not contain query strings."
          }
          $blockedHosts = @("github.com", "www.github.com", "api.github.com", "objects.githubusercontent.com", "github-releases.githubusercontent.com")
          $artifactHost = $baseUri.Host.ToLowerInvariant()
          if ($blockedHosts -contains $artifactHost -or $artifactHost.EndsWith(".githubusercontent.com")) {
            throw "PRIVATE_UPDATE_ARTIFACT_BASE_URL must point to the private update artifact host, not GitHub release storage."
          }
          $rolloutPercentage = 100
          if (-not [string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_ROLLOUT_PERCENTAGE)) {
            $rolloutPercentage = [int]$env:PRIVATE_UPDATE_ROLLOUT_PERCENTAGE
          }
          if ($rolloutPercentage -lt 0 -or $rolloutPercentage -gt 100) {
            throw "PRIVATE_UPDATE_ROLLOUT_PERCENTAGE must be an integer from 0 to 100."
          }
          $artifactUrl = "$baseUrl/$zipPath"
          $manifest = [ordered]@{
            schema_version = "kmtech-private-update-manifest-v1"
            manifest_version = 1
            app_id = "Label_Match"
            package_id = "Label_Match"
            channel = "stable"
            version = $env:LABEL_MATCH_RELEASE_TAG
            artifact = [ordered]@{
              name = $zipPath
              url = $artifactUrl
              size_bytes = $size
              sha256 = $hash
            }
            archive = [ordered]@{
              format = "zip"
              pyinstaller_layout = "onedir"
              top_level = "Label_Match"
              entrypoint = "Label_Match.exe"
              required_files = @(
                "Label_Match/Label_Match.exe",
                "Label_Match/release-identity.json",
                "Label_Match/install_label_match_direct_sync.ps1",
                "Label_Match/staged-installer-verification.json",
                "Label_Match/tools/release_cli_tools_manifest.json",
                "Label_Match/tools/direct_sync_relay_runner.exe",
                "Label_Match/tools/direct_sync_relay_install_pack/direct_sync_relay_install_pack.exe",
                "Label_Match/tools/register_label_match_worker_pc.exe"
              )
              deny_runtime_state = $true
            }
            install = [ordered]@{
              strategy = "robocopy_backup_then_mirror"
              preserve_paths = @("config/app_settings.json", "_internal/config/app_settings.json")
              restart_executable = "Label_Match.exe"
            }
            rollout = [ordered]@{
              percentage = $rolloutPercentage
              allow_pc_ids = @()
              deny_pc_ids = @()
            }
          }
          $manifestPath = "Label_Match-$($env:LABEL_MATCH_RELEASE_TAG).manifest.json"
          $manifest | ConvertTo-Json -Depth 8 | Set-Content -Encoding utf8NoBOM $manifestPath

      - name: Sign private update manifest
        if: ${{ steps.private_feed.outputs.enabled == 'true' }}
        shell: pwsh
        env:
          PRIVATE_UPDATE_MANIFEST_SIGNING_KEY: ${{ secrets.PRIVATE_UPDATE_MANIFEST_SIGNING_KEY }}
          PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY: ${{ vars.PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY }}
          PRIVATE_UPDATE_MANIFEST_PATH: Label_Match-${{ env.LABEL_MATCH_RELEASE_TAG }}.manifest.json
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_SIGNING_KEY)) {
            throw "PRIVATE_UPDATE_MANIFEST_SIGNING_KEY secret is required."
          }
          if ([string]::IsNullOrWhiteSpace($env:PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY)) {
            throw "PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY variable is required."
          }
          if (-not (Test-Path -LiteralPath $env:PRIVATE_UPDATE_MANIFEST_PATH)) {
            throw "Private update manifest not found: $env:PRIVATE_UPDATE_MANIFEST_PATH"
          }
          $script = @'
          import base64
          import json
          import os
          from pathlib import Path

          from cryptography.exceptions import InvalidSignature
          from cryptography.hazmat.primitives.asymmetric.ed25519 import (
              Ed25519PrivateKey,
              Ed25519PublicKey,
          )

          key_text = os.environ["PRIVATE_UPDATE_MANIFEST_SIGNING_KEY"].strip()
          try:
              key_bytes = bytes.fromhex(key_text)
          except ValueError:
              key_bytes = base64.b64decode(key_text, validate=True)
          if len(key_bytes) != 32:
              raise SystemExit("PRIVATE_UPDATE_MANIFEST_SIGNING_KEY must decode to 32 bytes")
          try:
              public_key = bytes.fromhex(os.environ["PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY"].strip())
          except ValueError:
              raise SystemExit("PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY must be hex") from None
          if len(public_key) != 32:
              raise SystemExit("PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY must decode to 32 bytes")

          manifest_path = Path(os.environ["PRIVATE_UPDATE_MANIFEST_PATH"])
          manifest = json.loads(manifest_path.read_text(encoding="utf-8-sig"))
          canonical = json.dumps(manifest, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode("utf-8")
          signature = Ed25519PrivateKey.from_private_bytes(key_bytes).sign(canonical)
          try:
              Ed25519PublicKey.from_public_bytes(public_key).verify(signature, canonical)
          except InvalidSignature:
              raise SystemExit(
                  "Private update manifest signature does not match "
                  "PRIVATE_UPDATE_MANIFEST_PUBLIC_KEY"
              ) from None
          manifest_path.with_name(manifest_path.name + ".sig").write_bytes(signature)
          print("OK: private update manifest signature verifies against configured public key")
          '@
          $script | python -
          if ($LASTEXITCODE -ne 0) {
            throw "Private update manifest signature self-test failed."
          }
          $sigPath = "$env:PRIVATE_UPDATE_MANIFEST_PATH.sig"
          $sig = [System.IO.File]::ReadAllBytes($sigPath)
          if ($sig.Length -ne 64) {
            throw "Private update manifest signature must be 64 bytes."
          }

      - name: Publish private update feed
        if: ${{ steps.private_feed.outputs.enabled == 'true' }}
        shell: pwsh
        env:
          COMPANY_UPDATE_UPLOAD_URL: ${{ vars.COMPANY_UPDATE_UPLOAD_URL }}
          COMPANY_UPDATE_UPLOAD_TOKEN: ${{ secrets.COMPANY_UPDATE_UPLOAD_TOKEN }}
          COMPANY_UPDATE_UPLOAD_ORIGIN_IP: ${{ vars.COMPANY_UPDATE_UPLOAD_ORIGIN_IP }}
          PRIVATE_UPDATE_APP_SLUG: label_match
          PRIVATE_UPDATE_CHANNEL: stable
          PRIVATE_UPDATE_ZIP_PATH: Label_Match-${{ env.LABEL_MATCH_RELEASE_TAG }}.zip
          PRIVATE_UPDATE_MANIFEST_PATH: Label_Match-${{ env.LABEL_MATCH_RELEASE_TAG }}.manifest.json
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($name in @("COMPANY_UPDATE_UPLOAD_URL", "COMPANY_UPDATE_UPLOAD_TOKEN")) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name").Value)) {
              throw "$name is required."
            }
          }
          $uploadUrl = $env:COMPANY_UPDATE_UPLOAD_URL.Trim()
          $uploadUri = [System.Uri]$uploadUrl
          if ($uploadUri.Scheme -ne "https") {
            throw "COMPANY_UPDATE_UPLOAD_URL must use HTTPS."
          }
          if (-not [string]::IsNullOrWhiteSpace($uploadUri.UserInfo) -or -not [string]::IsNullOrWhiteSpace($uploadUri.Query) -or -not [string]::IsNullOrWhiteSpace($uploadUri.Fragment)) {
            throw "COMPANY_UPDATE_UPLOAD_URL must not contain userinfo, query, or fragment."
          }
          $uploadOriginIp = $env:COMPANY_UPDATE_UPLOAD_ORIGIN_IP
          if ($null -eq $uploadOriginIp) {
            $uploadOriginIp = ""
          }
          $uploadOriginIp = $uploadOriginIp.Trim()
          if (-not [string]::IsNullOrWhiteSpace($uploadOriginIp) -and -not ($uploadOriginIp -match '^(?:25[0-5]|2[0-4]\d|1?\d?\d)(?:\.(?:25[0-5]|2[0-4]\d|1?\d?\d)){3}$')) {
            throw "COMPANY_UPDATE_UPLOAD_ORIGIN_IP must be an IPv4 address."
          }
          $appSlug = $env:PRIVATE_UPDATE_APP_SLUG
          $channel = $env:PRIVATE_UPDATE_CHANNEL
          $zipPath = $env:PRIVATE_UPDATE_ZIP_PATH
          $manifestPath = $env:PRIVATE_UPDATE_MANIFEST_PATH
          $manifestSigPath = "$manifestPath.sig"
          $uploadToken = $env:COMPANY_UPDATE_UPLOAD_TOKEN
          if ($uploadToken.Contains("`r") -or $uploadToken.Contains("`n")) {
            throw "COMPANY_UPDATE_UPLOAD_TOKEN must not contain line breaks."
          }
          foreach ($path in @($zipPath, "$zipPath.sha256", $manifestPath, $manifestSigPath)) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required private update publish file is missing: $path"
            }
          }
          $curlArgs = @(
            "--fail", "--show-error", "--silent",
            "--retry", "3", "--retry-all-errors", "--connect-timeout", "30", "--max-time", "900",
            "-X", "POST",
            "-F", "app_slug=$appSlug",
            "-F", "channel=$channel",
            "-F", "artifact=@$zipPath",
            "-F", "checksum=@$zipPath.sha256",
            "-F", "manifest=@$manifestPath",
            "-F", "signature=@$manifestSigPath",
            $uploadUrl
          )
          if (-not [string]::IsNullOrWhiteSpace($uploadOriginIp)) {
            $resolvePort = if ($uploadUri.IsDefaultPort) { 443 } else { $uploadUri.Port }
            $curlArgs = @("--resolve", "$($uploadUri.Host):$($resolvePort):$uploadOriginIp") + $curlArgs
          }
          $curlConfigToken = $uploadToken.Replace("\", "\\").Replace('"', '\"')
          $curlConfig = "header = `"Authorization: Bearer $curlConfigToken`""
          $curlConfig | & curl.exe --config - @curlArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish private update feed over HTTPS."
          }

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            Label_Match-${{ env.LABEL_MATCH_RELEASE_TAG }}.zip
            Label_Match-${{ env.LABEL_MATCH_RELEASE_TAG }}.zip.sha256
            Label_Match-${{ env.LABEL_MATCH_RELEASE_TAG }}.archive-verification.json
          tag_name: ${{ env.LABEL_MATCH_RELEASE_TAG }}
          name: "Release ${{ env.LABEL_MATCH_RELEASE_TAG }}"
          body: "Internal release ${{ env.LABEL_MATCH_RELEASE_TAG }}. Verified ZIP, SHA-256 checksum, and archive verification report are attached."
          draft: false
          prerelease: false

      - name: Clean release virtual environment
        if: ${{ always() }}
        shell: pwsh
        run: |
          $venvCandidate = if ([string]::IsNullOrWhiteSpace($env:LABEL_MATCH_RELEASE_VENV)) {
            Join-Path $env:RUNNER_TEMP "label-match-release-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          } else {
            $env:LABEL_MATCH_RELEASE_VENV
          }
          if (Test-Path -LiteralPath $venvCandidate) {
            $venv = [System.IO.Path]::GetFullPath($venvCandidate)
            $runnerTemp = [System.IO.Path]::GetFullPath($env:RUNNER_TEMP).TrimEnd('\') + '\'
            if (-not $venv.StartsWith($runnerTemp, [System.StringComparison]::OrdinalIgnoreCase)) {
              throw "Refusing to clean venv outside RUNNER_TEMP: $venv"
            }
            Remove-Item -LiteralPath $venv -Recurse -Force
          }
