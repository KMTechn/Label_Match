name: Create GitHub Release for Label_Match

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyinstaller

      - name: Run tests
        run: |
          python -B -m py_compile Label_Match.py direct_sync_push.py direct_sync_runtime.py direct_sync_operator.py tools/direct_sync_relay_runner.py tools/direct_sync_relay_operator.py tools/direct_sync_relay_install_pack.py tools/direct_sync_phase_g_label_match_runtime_report.py tools/register_label_match_worker_pc.py
          python -m pytest -q

      - name: Build with PyInstaller (One-Folder mode)
        # ❗ 이 부분에 --hidden-import tkcalendar 옵션을 추가했습니다.
        run: pyinstaller --name "Label_Match" --onedir --windowed --icon="assets/logo.ico" --add-data "assets;assets" --add-data "config;config" --hidden-import pygame --hidden-import Pillow --hidden-import tkcalendar Label_Match.py

      - name: Build direct-sync CLI tools
        run: |
          pyinstaller --name "direct_sync_relay_runner" --onefile --console --paths "." tools/direct_sync_relay_runner.py
          pyinstaller --name "direct_sync_relay_install_pack" --onefile --console --paths "." tools/direct_sync_relay_install_pack.py
          pyinstaller --name "register_label_match_worker_pc" --onefile --console --paths "." tools/register_label_match_worker_pc.py

      - name: Include direct-sync relay tools
        run: |
          New-Item -ItemType Directory -Force -Path dist/Label_Match/tools
          Copy-Item install_label_match_direct_sync.ps1 -Destination dist/Label_Match
          Copy-Item direct_sync_push.py,direct_sync_runtime.py,direct_sync_operator.py -Destination dist/Label_Match
          Copy-Item tools/direct_sync_relay_runner.py,tools/direct_sync_relay_operator.py,tools/direct_sync_relay_install_pack.py,tools/direct_sync_phase_g_label_match_runtime_report.py,tools/register_label_match_worker_pc.py -Destination dist/Label_Match/tools
          Copy-Item dist/direct_sync_relay_runner.exe,dist/direct_sync_relay_install_pack.exe,dist/register_label_match_worker_pc.exe -Destination dist/Label_Match/tools

      - name: Record tokenless self-enrollment note
        run: |
          [System.IO.File]::WriteAllText("dist/Label_Match/tools/enrollment_token.txt.template", "Normal installs use PRODUCER_SELF_ENROLL_ALLOWED_IPS on the server. Do not bundle a deployment token unless an explicit fallback change window requires it.", [System.Text.UTF8Encoding]::new($false))

      - name: Zip the build folder
        # 빌드된 폴더 전체(dist/Label_Match)를 압축합니다.
        run: |
          Compress-Archive -Path dist/Label_Match -DestinationPath "Label_Match-${{ github.ref_name }}.zip"
      
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "Label_Match-${{ github.ref_name }}.zip"
          name: "Release ${{ github.ref_name }}"
          body: "New release version ${{ github.ref_name }}"
          draft: false
          prerelease: false
